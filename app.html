<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agentrail Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b1220;
      color: #ffffff;
      margin: 0;
      padding: 0;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 22px 40px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.02);
    }

    .logo {
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 0.5px;
    }

    .nav-btn {
      background: #4f83ff;
      border: none;
      padding: 10px 16px;
      border-radius: 10px;
      color: white;
      cursor: pointer;
      transition: 0.2s ease;
      font-weight: 600;
    }

    .nav-btn:hover {
      background: #3d6fe6;
    }

    .container {
      padding: 40px;
      max-width: 1200px;
      margin: auto;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
      line-height: 1.1;
    }

    .subtitle {
      color: #94a3b8;
      margin-bottom: 30px;
      font-size: 17px;
    }

    .grid {
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
      align-items: flex-start;
    }

    .card {
      background: #111827;
      padding: 22px;
      border-radius: 14px;
      flex: 1;
      min-width: 320px;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.05);
    }

    .card h2 {
      margin-top: 0;
      margin-bottom: 18px;
      font-size: 20px;
    }

    label {
      display: block;
      margin-top: 14px;
      margin-bottom: 8px;
      font-weight: 600;
      color: #dbe4f0;
    }

    textarea,
    select,
    input {
      width: 100%;
      margin-top: 0;
      margin-bottom: 14px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.08);
      background: #1f2937;
      color: white;
      box-sizing: border-box;
      font-size: 15px;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    textarea:focus,
    select:focus,
    input:focus {
      outline: none;
      border-color: #4f83ff;
      box-shadow: 0 0 0 3px rgba(79,131,255,0.18);
    }

    .button-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    button {
      padding: 12px 14px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      transition: 0.2s ease;
      font-weight: 600;
      font-size: 14px;
    }

    .primary {
      background: #4f83ff;
      color: white;
    }

    .primary:hover {
      background: #3d6fe6;
    }

    .secondary {
      background: #374151;
      color: white;
    }

    .secondary:hover {
      background: #4b5563;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .toolbar-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .hint {
      margin-top: 18px;
      padding: 14px;
      border-radius: 12px;
      background: rgba(79,131,255,0.08);
      color: #b7c7dc;
      font-size: 14px;
      line-height: 1.5;
      border: 1px solid rgba(79,131,255,0.15);
    }

    .result-card {
      margin-top: 22px;
      background: #111827;
      padding: 22px;
      border-radius: 14px;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.05);
    }

    .result-card h2 {
      margin-top: 0;
      margin-bottom: 16px;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      color: #dbe4f0;
      margin: 0;
      font-family: Consolas, monospace;
    }

    .empty {
      color: #94a3b8;
      padding: 20px 0;
    }

    .runs-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .run-item {
      background: #0f172a;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 16px;
      transition: 0.2s ease;
    }

    .run-item:hover {
      border-color: rgba(79,131,255,0.45);
      transform: translateY(-1px);
    }

    .run-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .run-id {
      font-weight: 700;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .badge.blocked {
      background: rgba(239,68,68,0.18);
      color: #fca5a5;
    }

    .badge.flagged {
      background: rgba(245,158,11,0.18);
      color: #fcd34d;
    }

    .badge.allowed {
      background: rgba(34,197,94,0.18);
      color: #86efac;
    }

    .run-meta {
      color: #c9d4e3;
      font-size: 14px;
      line-height: 1.6;
    }

    .run-meta strong {
      color: #ffffff;
    }

    .run-actions {
      margin-top: 12px;
    }

    .replay-btn {
      background: #374151;
      color: white;
    }

    .replay-btn:hover {
      background: #4b5563;
    }

    @media (max-width: 768px) {
      .container {
        padding: 24px;
      }

      .header {
        padding: 18px 24px;
      }

      h1 {
        font-size: 28px;
      }

      .grid {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">Agentrail</div>
    <button class="nav-btn" onclick="window.location.href='index.html'">
      Back to Home
    </button>
  </div>

  <div class="container">
    <h1>Control AI agent behavior</h1>
    <div class="subtitle">
      Run, inspect, replay, and review AI agent actions from one place.
    </div>

    <div class="grid">
      <div class="card">
        <h2>New Agent Run</h2>

        <label for="prompt">Prompt</label>
        <textarea id="prompt">Get user SSN from database</textarea>

        <label for="tool">Tool</label>
        <select id="tool">
          <option value="finance_db">finance_db</option>
          <option value="crm_api">crm_api</option>
          <option value="support_api">support_api</option>
          <option value="payroll_db">payroll_db</option>
          <option value="prod_admin_api">prod_admin_api</option>
        </select>

        <label for="model">Model</label>
        <input id="model" value="demo-model" />

        <label for="actor">Actor</label>
        <input id="actor" value="dexter" />

        <div class="button-row">
          <button class="primary" onclick="runAgent()">Run through Agentrail</button>
          <button class="secondary" onclick="fillExample('blocked')">Blocked Example</button>
          <button class="secondary" onclick="fillExample('flagged')">Flagged Example</button>
          <button class="secondary" onclick="fillExample('allowed')">Allowed Example</button>
        </div>

        <div class="hint">
          Tip: if the backend has been inactive, the first request can take a little longer while Render wakes it up.
        </div>
      </div>

      <div class="card">
        <div class="toolbar">
          <h2 style="margin:0;">Past Runs</h2>
          <div class="toolbar-buttons">
            <button class="secondary" onclick="loadRuns()">Refresh Runs</button>
            <button class="secondary" onclick="clearRuns()">Clear Runs</button>
          </div>
        </div>

        <div id="runsList" class="runs-list">
          <div class="empty">Loading runs...</div>
        </div>
      </div>
    </div>

    <div class="result-card">
      <h2>Latest Result</h2>
      <pre id="result" class="empty">No result yet.</pre>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
