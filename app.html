<!DOCTYPE html>
<html>
<head>
  <title>Agentrail Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b1220;
      color: #fff;
      margin: 0;
      padding: 0;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .logo {
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .nav-btn {
      background: #3b82f6;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    .nav-btn:hover {
      background: #2563eb;
    }

    /* Layout */
    .container {
      padding: 40px;
      max-width: 1200px;
      margin: auto;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #94a3b8;
      margin-bottom: 30px;
    }

    .grid {
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
    }

    .card {
      background: #111827;
      padding: 20px;
      border-radius: 12px;
      flex: 1;
      min-width: 300px;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.05);
    }

    textarea, select, input {
      width: 100%;
      margin-top: 10px;
      margin-bottom: 15px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #1f2937;
      color: white;
    }

    button {
      padding: 12px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      margin-right: 10px;
      transition: 0.2s;
    }

    .primary {
      background: #3b82f6;
      color: white;
    }

    .primary:hover {
      background: #2563eb;
    }

    .secondary {
      background: #374151;
      color: white;
    }

    .secondary:hover {
      background: #4b5563;
    }

    .empty {
      color: #64748b;
      text-align: center;
      padding: 30px;
    }

  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <div class="logo">Agentrail</div>
    <button class="nav-btn" onclick="window.location.href='index.html'">
      Back to Home
    </button>
  </div>

  <!-- MAIN -->
  <div class="container">

    <h1>Control AI agent behavior</h1>
    <div class="subtitle">
      Run, inspect, replay, and review AI agent actions from one place.
    </div>

    <div class="grid">

      <!-- LEFT -->
      <div class="card">
        <h2>New Agent Run</h2>

        <textarea id="prompt">Get user SSN from database</textarea>

        <label>Tool</label>
        <select id="tool">
          <option>finance_db</option>
        </select>

        <label>Model</label>
        <input id="model" value="demo-model" />

        <label>Actor</label>
        <input id="actor" value="dexter" />

        <button class="primary" onclick="runAgent()">Run through Agentrail</button>
      </div>

      <!-- RIGHT -->
      <div class="card">
        <h2>Past Runs</h2>
        <div id="runs" class="empty">No runs yet</div>
      </div>

    </div>

    <div class="card" style="margin-top:20px;">
      <h2>Latest Result</h2>
      <pre id="result" class="empty">Run something to see results</pre>
    </div>

  </div>

  <script>
    const API_BASE = "https://agentrail-api.onrender.com";

    async function runAgent() {
      const data = {
        prompt: document.getElementById("prompt").value,
        tool: document.getElementById("tool").value,
        model: document.getElementById("model").value,
        actor: document.getElementById("actor").value
      };

      const res = await fetch(API_BASE + "/run", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      });

      const json = await res.json();
      document.getElementById("result").textContent =
        JSON.stringify(json, null, 2);

      loadRuns();
    }

    async function loadRuns() {
      const res = await fetch(API_BASE + "/runs");
      const runs = await res.json();

      const container = document.getElementById("runs");

      if (!runs.length) {
        container.innerHTML = "No runs yet";
        return;
      }

      container.innerHTML = runs.map(r =>
        `<div style="margin-bottom:10px;">${r.prompt}</div>`
      ).join("");
    }

    loadRuns();
  </script>

</body>
</html>
